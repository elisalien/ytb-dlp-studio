name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Package Windows
        run: |
          cd dist
          zip -r ../yt-dlp-4k-windows.zip .
          cd ..
          echo "✔ Windows : yt-dlp-4k-windows.zip"

      - name: Package macOS
        run: |
          cd dist-mac
          zip -r ../yt-dlp-4k-mac.zip .
          cd ..
          echo "✔ macOS   : yt-dlp-4k-mac.zip"

      - name: Package Linux
        run: |
          cd dist-linux
          zip -r ../yt-dlp-4k-linux.zip .
          cd ..
          echo "✔ Linux   : yt-dlp-4k-linux.zip"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          name: "yt-dlp 4K ${{ github.ref_name }}"
          generate_release_notes: true
          files: |
            yt-dlp-4k-windows.zip
            yt-dlp-4k-mac.zip
            yt-dlp-4k-linux.zip
