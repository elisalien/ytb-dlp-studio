name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Tag de version à publier (ex : v1.2)'
        required: true
        default: 'v1.2'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve version
        id: ver
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.version }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${{ github.ref_name }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Package Windows
        run: |
          cd dist
          zip -r ../yt-dlp-4k-windows.zip .
          cd ..
          echo "✔ Windows : yt-dlp-4k-windows.zip"

      - name: Package macOS
        run: |
          cd dist-mac
          zip -r ../yt-dlp-4k-mac.zip .
          cd ..
          echo "✔ macOS   : yt-dlp-4k-mac.zip"

      - name: Package Linux
        run: |
          cd dist-linux
          zip -r ../yt-dlp-4k-linux.zip .
          cd ..
          echo "✔ Linux   : yt-dlp-4k-linux.zip"

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          name: "yt-dlp 4K ${{ steps.ver.outputs.tag }}"
          generate_release_notes: true
          files: |
            yt-dlp-4k-windows.zip
            yt-dlp-4k-mac.zip
            yt-dlp-4k-linux.zip
